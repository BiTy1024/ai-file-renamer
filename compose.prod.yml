# Production override — use with:
#   docker compose -f compose.yml -f compose.prod.yml up -d
#
# Exposes frontend on port 80 and backend on port 8000 directly.
# No reverse proxy — ports are publicly accessible.
# UFW must allow 80 and 8000 (server-setup.sh handles this).
#
# DOMAIN must be set in .env — Compose reads it automatically.

services:
  adminer:
    # Hidden behind debug profile in production.
    # To access: docker compose ... --profile debug up -d adminer
    # Then SSH tunnel: ssh -L 8080:127.0.0.1:8080 deploy@<server>
    profiles: ["debug"]

  prestart:
    networks:
      - default

  backend:
    networks:
      - default
    ports:
      - "8000:8000"
    labels: {}

  frontend:
    networks:
      - default
    ports:
      - "80:80"
    labels: {}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # DOMAIN is read from .env automatically by Docker Compose
        - VITE_API_URL=http://${DOMAIN}:8000
        - NODE_ENV=production

networks:
  # No external Traefik network needed
  traefik-public:
    external: false
