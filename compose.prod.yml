# Production override — use with:
#   docker compose -f compose.yml -f compose.prod.yml up -d
#
# Replaces Traefik-based routing with direct localhost port bindings.
# Host Nginx proxies to these ports. All ports are bound to 127.0.0.1 only.
#
# Configure scripts/deploy.conf before running server-setup.sh.
# DOMAIN must be set in .env — Compose reads it automatically.

services:
  adminer:
    # Hidden behind debug profile in production.
    # To access: docker compose ... --profile debug up -d adminer
    # Then SSH tunnel: ssh -L 8080:127.0.0.1:8080 deploy@<server>
    profiles: ["debug"]

  prestart:
    networks:
      - default

  backend:
    networks:
      - default
    ports:
      - "127.0.0.1:8000:8000"
    labels: {}

  frontend:
    networks:
      - default
    ports:
      - "127.0.0.1:3000:80"
    labels: {}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # DOMAIN is read from .env automatically by Docker Compose
        - VITE_API_URL=https://${DOMAIN}
        - NODE_ENV=production

networks:
  # No external Traefik network needed — host Nginx handles routing
  traefik-public:
    external: false
