# =============================================================================
# deploy.conf — Single configuration file for server deployment
# =============================================================================
# Copy this file and edit the values below before running any deploy scripts.
# All scripts in scripts/ read from this file automatically.
#
# Usage:
#   1. Edit the values below
#   2. Run: bash scripts/server-setup.sh
#   3. Follow the steps in docs/deployment-server.md
# =============================================================================

# --- Domain -------------------------------------------------------------------
# The domain where this app will be served.
# Nginx and SSL certificates will be configured for this domain.
APP_DOMAIN=ai.example.com

# --- Server -------------------------------------------------------------------
# Non-root user created on the server to own the app and run Docker.
DEPLOY_USER=deploy

# Directory on the server where the app will live.
APP_DIR=/opt/ai-namer

# --- Ports --------------------------------------------------------------------
# Ports the Docker containers bind to on localhost.
# Host Nginx proxies to these. Must match compose.prod.yml.
FRONTEND_PORT=3000
BACKEND_PORT=8000

# --- GitHub -------------------------------------------------------------------
# Your GitHub username or org name. Used to build the GHCR image paths:
#   ghcr.io/<GHCR_OWNER>/ai-namer-backend
#   ghcr.io/<GHCR_OWNER>/ai-namer-frontend
GHCR_OWNER=your-github-username

# --- Backups ------------------------------------------------------------------
# How many days of database backups to keep locally.
BACKUP_RETENTION_DAYS=30

# Directory on the server where backups are stored.
BACKUP_DIR=/opt/backups/db
