# Production override — use with:
#   docker compose -f compose.yml -f compose.prod.yml up -d
#
# Host-Caddy handles HTTPS and routes traffic to frontend/backend via localhost ports.
# Frontend and backend are bound to 127.0.0.1 only — not directly reachable from the internet.
#
# Host-Caddy routing:
#   renamer.durth.dev /api/* → localhost:8001  (FastAPI)
#   renamer.durth.dev /*     → localhost:8080  (Nginx/Frontend)

services:
  adminer:
    profiles: ["debug"]

  prestart:
    networks:
      - default

  backend:
    networks:
      - default
    labels: {}
    ports:
      - "127.0.0.1:8001:8000"

  frontend:
    networks:
      - default
    labels: {}
    ports:
      - "127.0.0.1:8080:80"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=https://${DOMAIN}
        - NODE_ENV=production

networks:
  traefik-public:
    external: false
