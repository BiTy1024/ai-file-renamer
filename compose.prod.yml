# Production override — use with:
#   docker compose -f compose.yml -f compose.prod.yml up -d
#
# Caddy handles HTTPS and routes traffic to frontend/backend internally.
# Frontend and backend are NOT exposed publicly — only Caddy is.
# Caddy fetches a Let's Encrypt certificate automatically.
#
# APP_DOMAIN must be set in .env

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - APP_DOMAIN=${DOMAIN}
    networks:
      - default
    depends_on:
      - frontend
      - backend

  adminer:
    profiles: ["debug"]

  prestart:
    networks:
      - default

  backend:
    networks:
      - default
    labels: {}

  frontend:
    networks:
      - default
    labels: {}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=https://${DOMAIN}
        - NODE_ENV=production

volumes:
  caddy_data:
  caddy_config:

networks:
  traefik-public:
    external: false
