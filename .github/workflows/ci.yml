name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: app
      SECRET_KEY: test-secret-key-for-ci-that-is-long-enough-for-hmac-sha256
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: testpass123
      PROJECT_NAME: AI-Namer
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run alembic upgrade head
      - run: uv run pytest tests/ -v --ignore=tests/integration

  backend-integration:
    name: Backend Integration Tests (Google Drive)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: app
      SECRET_KEY: test-secret-key-for-ci-that-is-long-enough-for-hmac-sha256
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: testpass123
      PROJECT_NAME: AI-Namer
      ENVIRONMENT: local
      GOOGLE_SA_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SA_CREDENTIALS_JSON }}
      GOOGLE_TEST_FOLDER_ID: ${{ secrets.GOOGLE_TEST_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run alembic upgrade head
      - run: uv run pytest tests/integration/ -v

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run biome check --no-errors-on-unmatched --files-ignore-unknown=true ./
      - run: bun run tsc -p tsconfig.build.json --noEmit

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f backend/Dockerfile -t backend-test .
      - run: docker build -f frontend/Dockerfile -t frontend-test --build-arg VITE_API_URL=http://localhost:8000 .

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      BACKEND_IMAGE: ghcr.io/bity1024/ai-namer-backend
      FRONTEND_IMAGE: ghcr.io/bity1024/ai-namer-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://${{ vars.APP_DOMAIN }}
            NODE_ENV=production
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.APP_DIR || '/opt/ai-namer' }}

            # Fetch latest compose files and scripts from main
            git pull origin main

            # Update image tags in .env
            TAG=${{ github.sha }}
            sed -i "s|^DOCKER_IMAGE_BACKEND=.*|DOCKER_IMAGE_BACKEND=${{ env.BACKEND_IMAGE }}|" .env
            sed -i "s|^DOCKER_IMAGE_FRONTEND=.*|DOCKER_IMAGE_FRONTEND=${{ env.FRONTEND_IMAGE }}|" .env
            sed -i "s|^TAG=.*|TAG=$TAG|" .env

            # Pull and restart (prestart container runs migrations automatically)
            docker compose -f compose.yml -f compose.prod.yml pull
            docker compose -f compose.yml -f compose.prod.yml up -d --remove-orphans

            echo "Deploy complete: $TAG"

      - name: Health check
        run: |
          sleep 10
          curl --fail --max-time 10 https://${{ vars.APP_DOMAIN }}/api/v1/utils/health-check/
          echo "Health check passed"
